services:
  komga-tailscale:
    image: tailscale/tailscale:latest
    container_name: komga_tailscale
    restart: unless-stopped
    hostname: ${TS_HOSTNAME}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/tailscale.json
    volumes:
      - ${TS_STATE_LOCATION}:/var/lib/tailscale
      - ./config:/config

  komga:
    image: gotson/komga
    container_name: komga_server
    restart: unless-stopped
    user: "${PUID}:${PUID}"
    volumes:
      - type: bind
        source: ${KOMGA_CONFIG_LOCATION}
        target: /config
      - type: bind
        source: ${KOMGA_DATA_LOCATION}
        target: /data
    environment:
      - TZ=${TZ}
    network_mode: "service:komga-tailscale"
