# https://github.com/qbittorrent/docker-qbittorrent-nox
# https://github.com/qdm12/gluetun
# https://wiki.servarr.com

services:
  arr-gluetun:
    image: qmcgaw/gluetun
    container_name: arr_gluetun
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - ${QBT_TORRENTING_PORT}:${QBT_TORRENTING_PORT} # qBittorent
      - ${QBT_TORRENTING_PORT}:${QBT_TORRENTING_PORT}/udp # qBittorent
      - ${QBT_WEBUI_PORT}:${QBT_WEBUI_PORT} # qBittorent
      - ${PARR_PORT}:${PARR_PORT} # Prowlarr
      - ${RARR_PORT}:${RARR_PORT} # Radarr
      - ${SARR_PORT}:${SARR_PORT} # Sonarr
    volumes:
      - ${GT_DATA_PATH}:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=${GT_VPN_PROVIDER}
      - VPN_TYPE=${GT_VPN_TYPE}
      - SERVER_COUNTRIES=${GT_VPN_SERVER_COUNTRIES}
      - UPDATER_PERIOD=${GT_VPN_UPDATER_PERIOD}
      # OpenVPN:
      - OPENVPN_USER=${GT_OVPN_USER}
      - OPENVPN_PASSWORD=${GT_OVPN_PWD}
      # Wireguard:
      - WIREGUARD_PRIVATE_KEY=${GT_WG_PVT_KEY}
      - WIREGUARD_ADDRESSES=${GT_WG_ADDR}

  arr-qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: arr_qbittorrent
    network_mode: "service:arr-gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=${QBT_WEBUI_PORT}
    volumes:
      - ${QBT_CONFIG_PATH}:/config
      - ${QBT_DOWNLOADS_PATH}:/downloads
    restart: unless-stopped

  arr-prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: arr_prowlarr
    network_mode: "service:arr-gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${PARR_CONFIG_PATH}:/config
    restart: unless-stopped

  arr-radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: arr_radarr
    network_mode: "service:arr-gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${RARR_CONFIG_PATH}:/config
      - ${MEDIA_MOVIES_PATH}:/movies #optional
      - ${MEDIA_ANIME_PATH}:/anime #optional
      - ${QBT_DOWNLOADS_PATH}:/downloads #optional
    restart: unless-stopped

  arr-sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: arr_sonarr
    network_mode: "service:arr-gluetun"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${SARR_CONFIG_PATH}:/config
      - ${MEDIA_SERIES_PATH}:/tv #optional
      - ${MEDIA_ANIME_PATH}:/anime #optional
      - ${QBT_DOWNLOADS_PATH}:/downloads #optional
    restart: unless-stopped
