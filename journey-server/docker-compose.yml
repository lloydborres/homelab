# https://github.com/Journey-Cloud/self-hosted-boilerplate/blob/main/docker-compose/docker-compose.yml

name: journey

services:
  journey-tailscale:
    image: tailscale/tailscale:latest
    container_name: journey_tailscale
    hostname: ${TS_HOSTNAME}
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      # - TS_EXTRA_ARGS=--advertise-connector
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      # - TS_EXTRA_ARGS=--reset
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/tailscale.json
    volumes:
      - ${TS_STATE_LOCATION}:/var/lib/tailscale
      - ./config:/config
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    # sysctls:
    #   net.ipv4.ip_forward: "1"
    #   net.ipv6.conf.all.forwarding: "1"

  journey-sync-self-hosted-service:
    image: journeycloud/journey-sync-self-hosted
    container_name: journey_sync_service
    network_mode: "service:journey-tailscale" 
    labels:
      kompose.volume.size: 4Gi
    environment:
      EXPRESS_SERVER_PORT: 8080
      REDIS_PORT: 6379
      DISABLE_SSL: NO
      DOMAIN: ${JOURNEY_SYNC_DOMAIN}
      ROOT_MONGO_DB_URL: mongodb://${JOURNEY_SYNC_MONGO_ROOT_USERNAME}:${JOURNEY_SYNC_MONGO_ROOT_PASSWORD}@journey-mongodb-service:27017
      MONGO_DB_URL: mongodb://${JOURNEY_SYNC_MONGO_USER_USERNAME}:${JOURNEY_SYNC_MONGO_USER_PASSWORD}@journey-mongodb-service:27017/journey
      REDIS_URL: redis://journey-redis-service:6379
      FS_PATH: /mnt/data
      JOURNEY_SYNC_SIGNED: ${JOURNEY_SYNC_SIGNED}
      ADMIN_JS_COOKIE_PASSWORD: ${JOURNEY_SYNC_ADMIN_JS_COOKIE_PASSWORD}
      TYPESENSE_HOST: journey-typesense-service
      TYPESENSE_PORT: 8108
      TYPESENSE_PROTOCOL: http
      TYPESENSE_API_KEY: ${JOURNEY_SYNC_TYPESENSE_API_KEY}
    entrypoint: 'npm run launch'
    depends_on:
      - journey-mongodb-service
      - journey-redis-service
      - journey-typesense-service
    volumes:
      - journey-fs-volume:/mnt/data
    # ports:
    #   - 8080:8080

  journey-sync-self-hosted-media:
    image: journeycloud/journey-sync-self-hosted
    container_name: journey_sync_media
    labels:
      kompose.volume.size: 4Gi
    environment:
      REDIS_PORT: 6379
      DISABLE_SSL: NO
      DOMAIN: ${JOURNEY_SYNC_DOMAIN}
      ROOT_MONGO_DB_URL: mongodb://${JOURNEY_SYNC_MONGO_ROOT_USERNAME}:${JOURNEY_SYNC_MONGO_ROOT_PASSWORD}@journey-mongodb-service:27017
      MONGO_DB_URL: mongodb://${JOURNEY_SYNC_MONGO_USER_USERNAME}:${JOURNEY_SYNC_MONGO_ROOT_PASSWORD}@journey-mongodb-service:27017/journey
      REDIS_URL: redis://journey-redis-service:6379
      FS_PATH: /mnt/data
    entrypoint: 'npm run launchMedia'
    depends_on:
      - journey-sync-self-hosted-service
    volumes:
      - journey-fs-volume:/mnt/data

  journey-mongodb-service:
    image: mongo:7.0
    container_name: journey_sync_db
    labels:
      kompose.volume.size: 4Gi
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${JOURNEY_SYNC_MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${JOURNEY_SYNC_MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: journey
    volumes:
      - journey-mongodb-volume:/data/db

  journey-redis-service:
    image: redis:7.2.4-alpine
    container_name: journey_sync_redis
    labels:
      kompose.volume.size: 4Gi
    volumes:
      - journey-redis-volume:/data
    command: redis-server

  journey-typesense-service:
    image: typesense/typesense:26.0
    container_name: journey_sync_typesense
    labels:
      kompose.volume.size: 10Gi
    volumes:
      - journey-typesense-volume:/data
    command: '--data-dir /data --api-key=xyz --enable-cors'

volumes:
  journey-mongodb-volume:
    labels:
      kompose.volume.size: 10Gi
  journey-typesense-volume:
    labels:
      kompose.volume.size: 10Gi
  journey-fs-volume:
    labels:
      kompose.volume.size: 20Gi
  journey-redis-volume:
    labels:
      kompose.volume.size: 4Gi
